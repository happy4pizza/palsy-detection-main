[defaults]
output_dir = "../data/runs"
num_epochs = 15
batch_size = 4
num_workers = 0
shuffle_train = true
num_classes = 6
track_mae = true
pretrained = true
freeze_backbone = true
scheduler_factor = 0.5
scheduler_patience = 3
device = "auto"
seed = 42

[[experiments]]
run_name = "efficientnet_b0_baseline_v1"
task_type = "multi_pose"
model_name = "efficientnet_b0_multi_pose"
manifest_path = "../data/manifests/training_manifest_images_only.parquet"
transform_name = "basic"
learning_rate = 1e-4
dropout = 0.3
use_class_weights = true
repeats = 2

[[experiments]]
run_name = "efficientnet_b0_single_v1"
task_type = "single_image"
model_name = "efficientnet_b0_single_image"
manifest_path = "../data/manifests/training_manifest_single_images.parquet"
transform_name = "express"
learning_rate = 1e-5
dropout = 0.3
use_class_weights = false
